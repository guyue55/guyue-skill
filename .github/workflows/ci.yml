name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Lint & Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install pyyaml

      - name: Run Zero-Leakage Security Gate
        run: python scripts/security_scanner.py

      - name: Run Skill Structure Validation
        run: python scripts/ci_validate_skills.py

      - name: Run Test Prompt Evaluation
        run: python scripts/run_eval.py
