name: CI Pipeline

"on":
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Lint & Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Complete Release Gate
        run: bash scripts/test_suite.sh

      - name: Re-run Release Gate For Idempotence
        run: bash scripts/test_suite.sh
